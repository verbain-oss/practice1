<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Lotto Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS 영역 --- */
        :root {
            /* Light Mode (Default) */
            --bg-color: #f0f2f5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #666666;
            --btn-bg: #1a1a1a;
            --btn-text: #ffffff;
            --placeholder-border: #e0e0e0;
            --toggle-bg: rgba(255, 255, 255, 0.2);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --btn-bg: #384459;
            --btn-text: #f8fafc;
            --placeholder-border: #334155;
            --toggle-bg: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .lotto-card {
            background: var(--card-bg);
            padding: 3rem 2rem 2.5rem;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 480px;
            position: relative;
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
        }

        #theme-btn {
            background: var(--toggle-bg);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.25rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }

        #theme-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        h1 { 
            font-size: 2rem;
            color: var(--text-main); 
            margin-bottom: 0.5rem; 
            font-weight: 800;
            letter-spacing: -0.025em;
            transition: color 0.3s ease;
        }

        .subtitle { 
            color: var(--text-sub); 
            margin-bottom: 2.5rem; 
            font-size: 1rem; 
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .lotto-numbers {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 3rem;
            min-height: 56px;
        }

        /* 로또 공 기본 스타일 */
        .ball {
            aspect-ratio: 1/1;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            font-size: 1.3rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            box-shadow: 
                inset -4px -4px 10px rgba(0,0,0,0.3),
                0 8px 15px rgba(0,0,0,0.2);
            animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            border: 2px solid rgba(255,255,255,0.2);
        }

        /* 초기 빈 공 자리 */
        .ball-placeholder {
            aspect-ratio: 1/1;
            border-radius: 50%;
            border: 2px dashed var(--placeholder-border);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--placeholder-border);
            font-size: 1.2rem;
            transition: border-color 0.3s ease;
        }

        /* 번호 대역별 색상 설정 (실제 로또 기준) */
        .range-1  { background: radial-gradient(circle at 35% 35%, #fcd34d, #f59e0b); } /* 1-10: 노랑 */
        .range-11 { background: radial-gradient(circle at 35% 35%, #60a5fa, #2563eb); } /* 11-20: 파랑 */
        .range-21 { background: radial-gradient(circle at 35% 35%, #f87171, #dc2626); } /* 21-30: 빨강 */
        .range-31 { background: radial-gradient(circle at 35% 35%, #94a3b8, #475569); } /* 31-40: 회색 */
        .range-41 { background: radial-gradient(circle at 35% 35%, #a3e635, #65a30d); } /* 41-45: 초록 */

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #generate-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 1.2rem;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
            letter-spacing: -0.01em;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        #generate-btn:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.2);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        #generate-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        #generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .lotto-card { padding: 2.5rem 1.5rem 2rem; }
            .lotto-numbers { gap: 8px; }
            h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>

    <div class="lotto-card">
        <div class="theme-toggle">
            <button id="theme-btn" title="테마 변경">
                <span id="theme-icon">🌙</span>
            </button>
        </div>
        
        <h1>Lotto 6/45</h1>
        <p class="subtitle">오늘의 행운을 잡으세요!</p>
        
        <div id="lotto-numbers" class="lotto-numbers">
            <div class="ball-placeholder">?</div>
            <div class="ball-placeholder">?</div>
            <div class="ball-placeholder">?</div>
            <div class="ball-placeholder">?</div>
            <div class="ball-placeholder">?</div>
            <div class="ball-placeholder">?</div>
        </div>

        <button id="generate-btn">행운의 번호 생성</button>
    </div>

    <script>
        /* --- JavaScript 영역 --- */
        const generateBtn = document.getElementById('generate-btn');
        const numbersContainer = document.getElementById('lotto-numbers');
        const themeBtn = document.getElementById('theme-btn');
        const themeIcon = document.getElementById('theme-icon');

        // 테마 관리
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            themeIcon.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
        }

        themeBtn.addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            themeIcon.innerText = newTheme === 'dark' ? '☀️' : '🌙';
        });

        initTheme();

        // 번호에 따른 색상 클래스 반환
        function getBallColorClass(num) {
            if (num <= 10) return 'range-1';
            if (num <= 20) return 'range-11';
            if (num <= 30) return 'range-21';
            if (num <= 40) return 'range-31';
            return 'range-41';
        }

        // 1~45 중 중복 없는 6개 번호 생성 및 정렬
        function generateLottoNumbers() {
            const numbers = new Set();
            while (numbers.size < 6) {
                numbers.add(Math.floor(Math.random() * 45) + 1);
            }
            return Array.from(numbers).sort((a, b) => a - b);
        }

        generateBtn.addEventListener('click', () => {
            generateBtn.disabled = true;
            
            const luckyNumbers = generateLottoNumbers();
            numbersContainer.innerHTML = ''; 

            luckyNumbers.forEach((num, index) => {
                setTimeout(() => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${getBallColorClass(num)}`;
                    ball.innerText = num;
                    numbersContainer.appendChild(ball);

                    if (index === luckyNumbers.length - 1) {
                        generateBtn.disabled = false;
                    }
                }, index * 120);
            });
        });
    </script>
</body>
</html>
