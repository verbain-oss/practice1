<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC 500 Voca Master</title>
    <style>
        :root {
            /* Light Mode */
            --primary: #4a6cf7;
            --secondary: #6c757d;
            --success: #28a745;
            --danger: #dc3545;
            --bg: #f4f7fe;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #333333;
            --details-bg: #f8f9ff;
            --border-color: #eeeeee;
        }

        [data-theme="dark"] {
            /* Dark Mode */
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;
            --details-bg: #0f172a;
            --border-color: #334155;
            --secondary: #94a3b8;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s ease;
        }

        .container {
            width: 95%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            text-align: center;
            position: relative;
            transition: background-color 0.3s ease;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        #theme-btn {
            background: var(--bg);
            border: 1px solid var(--border-color);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: all 0.2s ease;
            color: var(--text-main);
        }

        #theme-btn:hover {
            transform: scale(1.05);
            background: var(--details-bg);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--border-color);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        #progress {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .word-card {
            margin: 30px 0;
            min-height: 280px;
        }

        #word {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
            letter-spacing: -0.02em;
        }

        #meaning {
            font-size: 1.6rem;
            color: var(--text-main);
            margin-bottom: 30px;
            font-weight: 600;
        }

        .details {
            text-align: left;
            background: var(--details-bg);
            padding: 24px;
            border-radius: 16px;
            border-left: 6px solid var(--primary);
            transition: background-color 0.3s ease;
        }

        .details p { margin: 12px 0; line-height: 1.6; color: var(--text-sub); }
        .label { font-weight: 700; color: var(--secondary); display: inline-block; width: 80px; font-size: 0.95rem; }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 40px;
        }

        button.nav-btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #prev-btn { background: var(--bg); color: var(--text-sub); border: 1px solid var(--border-color); }
        #next-btn { background: var(--primary); color: white; box-shadow: 0 4px 14px 0 rgba(74, 108, 247, 0.39); }
        
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-2px); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .info { margin-top: 20px; color: var(--secondary); font-size: 1rem; font-weight: 500; }

        @media (max-width: 480px) {
            .container { padding: 40px 20px; }
            #word { font-size: 2.8rem; }
            #meaning { font-size: 1.4rem; }
            .btn-group { flex-direction: column-reverse; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="theme-toggle">
        <button id="theme-btn" title="테마 변경">
            <span id="theme-icon">🌙</span>
        </button>
    </div>

    <div class="progress-bar"><div id="progress"></div></div>
    <div class="info"><span id="current-index">1</span> / <span id="total-count">0</span></div>

    <div class="word-card">
        <div id="word">Loading...</div>
        <div id="meaning">의미</div>
        
        <div class="details">
            <p><span class="label">예문:</span> <span id="example">...</span></p>
            <p><span class="label">동의어:</span> <span id="synonym" style="color: var(--success);">...</span></p>
            <p><span class="label">반의어:</span> <span id="antonym" style="color: var(--danger);">...</span></p>
        </div>
    </div>

    <div class="btn-group">
        <button id="prev-btn" class="nav-btn">이전 단어</button>
        <button id="next-btn" class="nav-btn">다음 단어 (Space)</button>
    </div>
</div>

<script>
    // 테마 관리
    const themeBtn = document.getElementById('theme-btn');
    const themeIcon = document.getElementById('theme-icon');

    function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeIcon.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
    }

    themeBtn.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        themeIcon.innerText = newTheme === 'dark' ? '☀️' : '🌙';
    });

    initTheme();

    // 500개 데이터를 담는 곳 (샘플 10개 제공, 이후 추가 가능)
    const vocaData = [
        { word: "Collaborate", meaning: "협력하다, 공동으로 작업하다", example: "We need to collaborate on this project.", synonym: "Cooperate, Work together", antonym: "Compete, Conflict" },
        { word: "Postpone", meaning: "연기하다, 미루다", example: "The meeting has been postponed until next week.", synonym: "Delay, Put off", antonym: "Advance, Forward" },
        { word: "Implement", meaning: "시행하다, 실행하다", example: "The new policy will be implemented tomorrow.", synonym: "Execute, Carry out", antonym: "Halt, Cancel" },
        { word: "Comprehensive", meaning: "종합적인, 포괄적인", example: "We offer a comprehensive training program.", synonym: "Inclusive, Thorough", antonym: "Limited, Partial" },
        { word: "Terminate", meaning: "종료하다, 끝내다", example: "The contract was terminated early.", synonym: "End, Finish", antonym: "Begin, Start" },
        { word: "Mandatory", meaning: "의무적인, 필수의", example: "Attendance at the seminar is mandatory.", synonym: "Compulsory, Required", antonym: "Optional, Voluntary" },
        { word: "Prospective", meaning: "유망한, 장래의", example: "We interviewed several prospective employees.", synonym: "Potential, Future", antonym: "Unlikely" },
        { word: "Affordable", meaning: "가격이 알맞은, 감당할 수 있는", example: "They sell high-quality goods at affordable prices.", synonym: "Inexpensive, Reasonable", antonym: "Expensive, Costly" },
        { word: "Amended", meaning: "개정된, 수정된", example: "The legislative bill was amended yesterday.", synonym: "Revised, Modified", antonym: "Fixed, Unchanged" },
        { word: "Preliminary", meaning: "예비의, 서두의", example: "The preliminary results are encouraging.", synonym: "Initial, Introductory", antonym: "Final, Concluding" }
    ];

    let currentIndex = 0;

    const wordEl = document.getElementById('word');
    const meaningEl = document.getElementById('meaning');
    const exampleEl = document.getElementById('example');
    const synonymEl = document.getElementById('synonym');
    const antonymEl = document.getElementById('antonym');
    const progressEl = document.getElementById('progress');
    const currentIndexEl = document.getElementById('current-index');
    const totalCountEl = document.getElementById('total-count');
    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');

    function updateCard() {
        const data = vocaData[currentIndex];
        wordEl.innerText = data.word;
        meaningEl.innerText = data.meaning;
        exampleEl.innerText = data.example;
        synonymEl.innerText = data.synonym;
        antonymEl.innerText = data.antonym;

        // 상태 업데이트
        currentIndexEl.innerText = currentIndex + 1;
        totalCountEl.innerText = vocaData.length;
        const percent = ((currentIndex + 1) / vocaData.length) * 100;
        progressEl.style.width = percent + '%';

        // 버튼 활성화 제어
        prevBtn.disabled = currentIndex === 0;
        if(currentIndex === vocaData.length - 1) {
            nextBtn.innerText = "처음부터 다시";
        } else {
            nextBtn.innerText = "다음 단어 (Space)";
        }
    }

    nextBtn.addEventListener('click', () => {
        if (currentIndex < vocaData.length - 1) {
            currentIndex++;
        } else {
            currentIndex = 0;
        }
        updateCard();
    });

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    });

    // 키보드 스페이스바 지원
    window.addEventListener('keydown', (e) => {
        if(e.code === "Space") {
            e.preventDefault();
            nextBtn.click();
        }
    });

    updateCard();
</script>

</body>
</html>
